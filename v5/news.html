<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>News — Copernicus for Transport</title>
<link rel="stylesheet" href="style.css" />
<style>
  .news-list { display: flex; flex-direction: column; gap: 0; max-width: 840px; }
  .news-item { display: block; padding: 24px 0; border-bottom: 1px solid var(--border); color: var(--text); }
  .news-item:hover { text-decoration: none; }
  .news-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .news-date { font-size: 12px; color: var(--text-faint); font-family: var(--font-mono); }
  .news-type { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 9px; border-radius: 4px; }
  .news-title { font-size: 18px; font-weight: 500; margin-bottom: 8px; line-height: 1.35; }
  .news-summary { font-size: 14px; color: var(--text-muted); line-height: 1.7; margin-bottom: 10px; }
  .news-link { font-size: 13px; font-weight: 500; }
  .t-grant { background: #E6F1FB; color: #0C447C; }
  .t-cassini { background: #EEEDFE; color: #26215C; }
  .t-product { background: #EAF3DE; color: #27500A; }
  .t-procurement { background: #FAEEDA; color: #633806; }
  .t-project { background: #E1F5EE; color: #085041; }
</style>
</head>
<body>
<nav class="site-nav" id="sitenav"></nav>
<section class="page-hero">
  <div class="container">
    <h1>News</h1>
    <p>Updates on EUSPA grant and procurement calls, CASSINI opportunities, and Copernicus product developments relevant to transport and mobility.</p>
  </div>
</section>
<section style="padding:28px 32px 64px;">
  <div class="container">
    <div class="filter-bar" id="filter-bar"></div>
    <div class="result-count" id="result-count"></div>
    <div class="news-list" id="news-list"></div>
  </div>
</section>
<footer class="site-footer" id="sitefooter"></footer>
<script src="app.js"></script>
<script>
let DATA;
const typeClass = { 'Grant call':'t-grant','CASSINI':'t-cassini','Product update':'t-product','Procurement':'t-procurement','Project':'t-project' };
function fmtDate(iso){ return new Date(iso+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function renderList(seg){
  let list = DATA.news.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if (seg !== 'all') list = list.filter(n => n.segment === seg || n.segment === 'all');
  document.getElementById('result-count').textContent = `${list.length} item${list.length!==1?'s':''}`;
  document.getElementById('news-list').innerHTML = list.length ? list.map(n => {
    const segObj = DATA.segments.find(s => s.id === n.segment);
    const segTag = segObj ? segBadge(segObj) : `<span class="badge" style="background:var(--bg-subtle);color:var(--text-muted)">All segments</span>`;
    return `<div class="news-item">
      <div class="news-meta"><span class="news-date">${fmtDate(n.date)}</span><span class="news-type ${typeClass[n.type]||''}">${esc(n.type)}</span>${segTag}</div>
      <div class="news-title">${esc(n.title)}</div>
      <div class="news-summary">${esc(n.body||n.summary)}</div>
      <a class="news-link" href="${n.link}" target="_blank" rel="noopener">Read more ↗</a>
    </div>`;
  }).join('') : '<p style="color:var(--text-faint)">No news in this segment.</p>';
}
loadContent().then(data => {
  DATA = data;
  mountChrome(data, 'news');
  const seg = new URLSearchParams(location.search).get('segment') || 'all';
  buildFilterButtons(document.getElementById('filter-bar'), data, seg, renderList);
  renderList(seg);
});
</script>
</body>
</html>
